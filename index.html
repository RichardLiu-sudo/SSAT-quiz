<html lang="zh-CN">
<head>

<title>SSAT 同义/类比蓝宝书 — 全能题库 (431题)</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--sub:#6e6e73;--accent:#0071e3;--green:#34c759;--red:#ff3b30;--border:#e5e5ea;--shadow:0 2px 12px rgba(0,0,0,.08);--radius:14px;--btn-h:44px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
.container{max-width:680px;margin:0 auto;padding:12px 14px 32px}
.header{text-align:center;padding:20px 10px 14px}
.header h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.header .sub{font-size:13px;color:var(--sub);margin-top:4px}
.filter-bar{background:var(--card);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;box-shadow:var(--shadow);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.filter-bar .label{font-size:12px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-right:2px}
.filter-bar .btn{border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;padding:7px 12px;border-radius:20px;cursor:pointer;transition:all .15s;font-family:inherit;font-weight:500}
.filter-bar .btn:hover{background:#f0f0f5}
.filter-bar .btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-bar .sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.mode-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.mode-bar .btn{border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;padding:8px 16px;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:500;box-shadow:var(--shadow);transition:all .15s}
.mode-bar .btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.mode-bar .info{font-size:12px;color:var(--sub)}
.stats{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.stat-item{text-align:center;flex:1;min-width:60px}
.stat-item .val{font-size:22px;font-weight:700;color:var(--accent)}
.stat-item .val.green{color:var(--green)}
.stat-item .val.red{color:var(--red)}
.stat-item .lbl{font-size:11px;color:var(--sub);margin-top:2px}
.progress-bar{width:100%;height:5px;background:var(--border);border-radius:3px;margin-top:10px;overflow:hidden}
.progress-bar .fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.q-card{background:var(--card);border-radius:var(--radius);padding:18px 16px 20px;margin-bottom:14px;box-shadow:var(--shadow)}
.q-meta{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.q-tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px}
.q-tag.stype{background:#e8f0fe;color:var(--accent)}
.q-tag.atype{background:#fce8e6;color:#e8710a}
.q-tag.level{background:#f0f0f5;color:var(--sub)}
.q-num{font-size:11px;color:var(--sub);font-weight:500}
.q-stem{font-size:18px;font-weight:700;margin:12px 0 16px;line-height:1.4;letter-spacing:-.2px}
.q-stem.syn-stem{font-family:"SF Mono","Menlo","Monaco","Courier New",monospace;letter-spacing:.5px}
.q-options{display:flex;flex-direction:column;gap:8px}
.opt-btn{display:flex;align-items:center;gap:10px;padding:12px 14px;border:2px solid var(--border);border-radius:12px;background:transparent;font-size:15px;font-family:inherit;cursor:pointer;transition:all .15s;text-align:left;width:100%}
.opt-btn:active{transform:scale(.98)}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:#f0f5ff}
.opt-letter{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--sub);flex-shrink:0}
.opt-text{flex:1;line-height:1.3}
.opt-btn.correct{border-color:var(--green);background:#e8f8ed}
.opt-btn.correct .opt-letter{background:var(--green);color:#fff}
.opt-btn.wrong{border-color:var(--red);background:#fde8e8}
.opt-btn.wrong .opt-letter{background:var(--red);color:#fff}
.opt-btn.reveal{border-color:var(--green);background:#e8f8ed}
.opt-btn.reveal .opt-letter{background:var(--green);color:#fff}
.opt-btn:disabled{opacity:.85;cursor:default}
.q-action{margin-top:16px;text-align:center}
.next-btn{padding:12px 48px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.next-btn:active{transform:scale(.96);opacity:.9}
.empty{text-align:center;padding:60px 20px;color:var(--sub);font-size:14px;line-height:1.6}
.bottom-bar{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.bottom-bar .btn{border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;padding:10px 20px;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:500;box-shadow:var(--shadow);transition:all .15s}
.bottom-bar .btn.danger{border-color:var(--red);color:var(--red)}
.bottom-bar .btn:active{transform:scale(.96)}

.q-def{margin-top:14px;padding:12px 14px;background:#f0f5fa;border-radius:10px;font-size:13px;color:#3a3a3c;line-height:1.6;border:1px solid #dce8f2}
.q-def .def-label{font-weight:600;color:var(--accent);margin-bottom:4px;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
.q-def .def-item{margin:2px 0;padding-left:8px;border-left:2px solid var(--accent)}
.q-def .def-type{color:#e8710a;font-weight:600}
.q-def.ana-def{background:#fdf6f0;border-color:#f5e0cc}
.q-def.ana-def .def-label{color:#e8710a}
.q-def.ana-def .def-item{border-left-color:#e8710a}

.hidden{display:none!important}
@media(max-width:400px){.q-stem{font-size:16px}.opt-btn{font-size:14px;padding:11px 12px}.stats{padding:12px 10px}.stat-item .val{font-size:18px}}

.opt-def{display:none;font-size:0.75em;color:#999;margin-top:2px;line-height:1.3;font-style:italic;font-weight:400;}
.explain-box{background:#fffde7;border-left:4px solid #f9a825;padding:10px 14px;margin-top:10px;border-radius:0 8px 8px 0;font-size:0.85em;color:#666;line-height:1.6;}

.rel-badge{display:inline-block;font-size:12px;font-weight:600;padding:2px 10px;border-radius:12px;margin-bottom:6px;letter-spacing:.2px}
.rel-badge[data-type="Synonym"]{background:#e3f2fd;color:#1565c0}
.rel-badge[data-type="Antonym"]{background:#fce4ec;color:#c62828}
.rel-badge[data-type="Type/Kind"]{background:#e8f5e9;color:#2e7d32}
.rel-badge[data-type="Part to Whole"]{background:#fff3e0;color:#e65100}
.rel-badge[data-type="Tool to Function"]{background:#e8eaf6;color:#283593}
.rel-badge[data-type="Cause and Effect"]{background:#f3e5f5;color:#6a1b9a}
.rel-badge[data-type="Degree/Intensity"]{background:#fff8e1;color:#f57f17}
.rel-badge[data-type="Characteristic"]{background:#e0f7fa;color:#00695c}
.rel-badge[data-type="Action to Object"]{background:#fbe9e7;color:#bf360c}
.rel-badge[data-type="Worker to Product"]{background:#f1f8e9;color:#33691e}
.rel-badge[data-type="Location"]{background:#ede7f6;color:#4527a0}
.rel-badge[data-type="Sequence"]{background:#efebe9;color:#4e342e}
.rel-select{border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;padding:7px 10px;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:500}

</style>
</head>

function loadState(){try{var s=localStorage.getItem("ssat_quiz_state");if(s){var d=JSON.parse(s);if(d.history)state.history=d.history;if(d.wrongBook)state.wrongBook=d.wrongBook;if(d.mode)state.mode=d.mode;if(d.typeFilter)state.typeFilter=d.typeFilter;if(d.levelFilter)state.levelFilter=d.levelFilter;if(d.relFilter)state.relFilter=d.relFilter;if(d.seqIdx!==undefined)state.seqIdx=d.seqIdx}}catch(e){}}
function saveState(){try{localStorage.setItem("ssat_quiz_state",JSON.stringify({history:state.history,wrongBook:state.wrongBook,mode:state.mode,typeFilter:state.typeFilter,levelFilter:state.levelFilter,relFilter:state.relFilter,seqIdx:state.seqIdx}))}catch(e){}}
function buildPool(){var ids=[];for(var i=0;i<ALL_QUESTIONS.length;i++){var q=ALL_QUESTIONS[i];if(state.typeFilter!=="all"&&q.type!==state.typeFilter)continue;if(state.levelFilter!=="all"&&q.level!==state.levelFilter)continue;if(state.typeFilter==="analogy"&&state.relFilter!=="all"&&q.relType!==state.relFilter)continue;if(state.mode==="wrong"&&state.wrongBook.indexOf(q.id)===-1)continue;ids.push(q.id)}state.currentPool=ids}
function pickQuestion(){buildPool();if(state.currentPool.length===0)return null;if(state.mode==="sequential"){if(state.seqIdx>=state.currentPool.length)state.seqIdx=0;return ALL_QUESTIONS[state.currentPool[state.seqIdx]]}else{return ALL_QUESTIONS[state.currentPool[Math.floor(Math.random()*state.currentPool.length)]]}}
function escapeHTML(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

function showDefinition(wasCorrect){
    var q=state.currentQ;
    if(!q)return;
    var defHTML='';
    if(q.type==='synonym'){
        var ansIdx=q.answer.charCodeAt(0)-65;
        var ansOpt=q.options[ansIdx];
        var ansWord=typeof ansOpt==='string'?ansOpt:ansOpt.text;
        defHTML='<div class="q-def"><div class="def-label">word definitions</div>';
        if(q.stem_def)defHTML+='<div class="def-item"><b>'+escapeHTML(q.stem)+'</b>: '+escapeHTML(q.stem_def)+'</div>';
        defHTML+='<div class="def-item"><b>'+escapeHTML(ansWord)+'</b>: '+(q.ans_def||(typeof ansOpt==='object'?ansOpt.def||'':''))+'</div>';
        defHTML+='</div>';
        if(!wasCorrect){
            defHTML+='<div class="explain-box"><b>Why is '+escapeHTML(q.answer)+' correct?</b> '+escapeHTML(q.stem)+' means "'+(q.stem_def||q.stem)+'", which is synonymous with <b>'+escapeHTML(ansWord)+'</b>.</div>';
        }
    }else if(q.type==='analogy'){
        var relLabelMap={Synonym:'Synonym（同义关系）',Antonym:'Antonym（反义关系）','Type/Kind':'Type/Kind（种属关系）','Part to Whole':'Part to Whole（部分-整体）','Tool to Function':'Tool to Function（工具-用途）','Cause and Effect':'Cause and Effect（因果）','Degree/Intensity':'Degree/Intensity（程度递进）',Characteristic:'Characteristic（特征/属性）','Action to Object':'Action to Object（动作-对象）','Worker to Product':'Worker to Product（工作者-产物）',Location:'Location（位置关系）',Sequence:'Sequence（顺序/阶段）'};
        var relBadge='';
        if(q.relType)relBadge='<span class="rel-badge" data-type="'+escapeHTML(q.relType)+'">'+escapeHTML(relLabelMap[q.relType]||q.relType)+'</span>';
        defHTML='<div class="q-def ana-def"><div class="def-label">relationship</div>';
        if(relBadge)defHTML+=relBadge;
        defHTML+='<div class="def-item"><span class="def-type">'+escapeHTML(q.relation||'Analogical relationship')+'</span></div>';
        defHTML+='</div>';
        if(!wasCorrect){
            defHTML+='<div class="explain-box"><b>Why is '+escapeHTML(q.answer)+' correct?</b> The relationship is: '+escapeHTML(q.relation||'analogy')+'. Only option '+escapeHTML(q.answer)+' follows this same logical pattern.</div>';
        }
    }
    document.getElementById('defArea').innerHTML=defHTML;
}

function renderQuestion(){var q=pickQuestion();if(!q){document.getElementById("questionArea").innerHTML='<div class="empty">题库中没有符合条件的题目。<br>请调整筛选条件或模式。</div>';return}state.currentQ=q;state.answered=false;var typeLabel=q.type==="synonym"?"同义题":"类比题";var typeClass=q.type==="synonym"?"stype":"atype";var stemClass=q.type==="synonym"?"syn-stem":"";var letters=["A","B","C","D","E"];var optsHTML="";for(var i=0;i<q.options.length;i++){var o=q.options[i];var label=typeof o==='string'?o:o.text;var def=typeof o==='object'&&o.def?'<span class="opt-def">'+o.def+'</span>':'';optsHTML+='<button class="opt-btn" onclick="selectAnswer(\''+letters[i]+'\')" data-letter="'+letters[i]+'"><span class="opt-letter">'+letters[i]+'</span><span class="opt-text">'+escapeHTML(label)+def+'</span></button>'}var html='<div class="q-card"><div class="q-meta"><span class="q-tag '+typeClass+'">'+typeLabel+'</span><span class="q-tag level">'+q.level+'</span><span class="q-num">第 '+q.num+' 题 / ID:'+q.id+'</span></div><div class="q-stem '+stemClass+'">'+escapeHTML(q.stem)+'</div><div class="q-options">'+optsHTML+'</div><div id="defArea"></div><div class="q-action hidden" id="nextArea"><button class="next-btn" onclick="nextQuestion()">下一题 &rarr;</button></div></div>';document.getElementById("questionArea").innerHTML=html}
function selectAnswer(letter){if(state.answered||!state.currentQ)return;state.answered=true;var q=state.currentQ;var isCorrect=(letter===q.answer);state.history[q.id]=isCorrect?"correct":"wrong";if(!isCorrect){if(state.wrongBook.indexOf(q.id)===-1)state.wrongBook.push(q.id)}else{var wi=state.wrongBook.indexOf(q.id);if(wi!==-1)state.wrongBook.splice(wi,1)}if(state.mode==="sequential")state.seqIdx++;saveState();var buttons=document.querySelectorAll(".opt-btn");buttons.forEach(function(btn){var bl=btn.getAttribute("data-letter");btn.disabled=true;if(bl===q.answer)btn.classList.add("reveal");if(bl===letter&&!isCorrect)btn.classList.add("wrong");if(bl===letter&&isCorrect)btn.classList.add("correct")});document.getElementById("nextArea").classList.remove("hidden");showDefinition(isCorrect);document.querySelectorAll('.opt-def').forEach(function(d){d.style.display='block'});updateStats()}
function nextQuestion(){renderQuestion();updateStats();updatePoolInfo();window.scrollTo({top:0,behavior:"smooth"})}
function updateStats(){var total=0,correct=0;for(var k in state.history){total++;if(state.history[k]==="correct")correct++}var wrong=total-correct;var rate=total>0?Math.round(correct/total*100):0;document.getElementById("statDone").textContent=total;document.getElementById("statCorrect").textContent=correct;document.getElementById("statWrong").textContent=wrong;document.getElementById("statRate").textContent=rate+"%";document.getElementById("statBook").textContent=state.wrongBook.length;buildPool();var p=state.currentPool.length>0?Math.min(total/(state.currentPool.length+total)*100,100):0;if(state.mode==="wrong")p=state.wrongBook.length>0?Math.min(correct/(state.wrongBook.length+correct)*100,100):0;document.getElementById("progressFill").style.width=p+"%"}
function updatePoolInfo(){buildPool();var info=state.mode==="wrong"?"错题本: "+state.currentPool.length+" 题":state.mode==="sequential"?"顺序: "+(state.seqIdx+1)+"/"+state.currentPool.length:"题库: "+state.currentPool.length+" 题";document.getElementById("poolInfo").textContent=info}
function setMode(mode){state.mode=mode;state.seqIdx=0;document.getElementById("btnRandom").classList.toggle("active",mode==="random");document.getElementById("btnSequential").classList.toggle("active",mode==="sequential");document.getElementById("btnWrong").classList.toggle("active",mode==="wrong");saveState();buildPool();updatePoolInfo();renderQuestion();updateStats()}
document.getElementById("filterBar").addEventListener("click",function(e){var btn=e.target.closest(".btn");if(!btn)return;var filter=btn.getAttribute("data-filter");var val=btn.getAttribute("data-val");var siblings=btn.parentElement.querySelectorAll('.btn[data-filter="'+filter+'"]');siblings.forEach(function(s){s.classList.remove("active")});btn.classList.add("active");if(filter==="type"){state.typeFilter=val;var rs=document.getElementById("relFilter");if(val==="analogy"){rs.classList.remove("hidden");state.relFilter=rs.value}else{rs.classList.add("hidden");state.relFilter="all";rs.value="all"}}if(filter==="level")state.levelFilter=val;state.seqIdx=0;saveState();buildPool();updatePoolInfo();renderQuestion();updateStats()});
document.getElementById("relFilter").addEventListener("change",function(){state.relFilter=this.value;state.seqIdx=0;saveState();buildPool();updatePoolInfo();renderQuestion();updateStats()});
function resetAll(){if(!confirm("确定要清空所有答题记录、错题本和进度吗？此操作不可撤销。"))return;state.history={};state.wrongBook=[];state.seqIdx=0;saveState();buildPool();updatePoolInfo();renderQuestion();updateStats()}
function clearWrongBook(){if(state.wrongBook.length===0){alert("错题本已为空。");return}if(!confirm("确定要清空错题本（共 "+state.wrongBook.length+" 题）吗？"))return;state.wrongBook=[];saveState();buildPool();updatePoolInfo();if(state.mode==="wrong")renderQuestion();updateStats()}
loadState();if(state.typeFilter==="analogy"){var rs=document.getElementById("relFilter");rs.classList.remove("hidden");rs.value=state.relFilter||"all"}
(function(){
var tbs=document.querySelectorAll('.btn[data-filter="type"]');tbs.forEach(function(b){b.classList.toggle("active",b.getAttribute("data-val")===state.typeFilter)});
var lbs=document.querySelectorAll('.btn[data-filter="level"]');lbs.forEach(function(b){b.classList.toggle("active",b.getAttribute("data-val")===state.levelFilter)});
document.getElementById("btnRandom").classList.toggle("active",state.mode==="random");
document.getElementById("btnSequential").classList.toggle("active",state.mode==="sequential");
document.getElementById("btnWrong").classList.toggle("active",state.mode==="wrong");
buildPool();updatePoolInfo();renderQuestion();updateStats()
})();
</script>
</body>
</html>
